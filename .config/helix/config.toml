theme = "tokyonight_moon"

[editor]

auto-format = true
scrolloff= 15
cursorline = true
completion-timeout = 5
completion-trigger-len = 1
undercurl = true
bufferline = "multiple" 
popup-border = "all"
line-number = "relative"
cursorcolumn = true 
middle-click-paste = true 
mouse = true

[editor.auto-save]

focus-lost = true
after-delay.enable = true
after-delay.timeout = 200

[editor.cursor-shape]
# "bar" , "block" , "underline"
insert = "bar"
normal = "bar"
select = "bar"

[editor.soft-wrap]

enable = true

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true

[keys.insert]

"C-[" = "normal_mode"


[keys.normal]

C-x = ":buffer-close"
C-r = ":reload"
S-d = ":format"

[editor.lsp]
# display-inlay-hints = true
# display-messages = true
